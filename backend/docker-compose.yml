version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: flowpilot-backend:latest
    container_name: flowpilot-backend
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped